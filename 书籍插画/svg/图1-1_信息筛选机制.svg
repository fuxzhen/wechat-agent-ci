<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="100%" style="stop-color:#4A90D9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00D9FF"/>
    </marker>
  </defs>
  
  <rect width="800" height="550" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="24" font-weight="bold">图1-1 信息筛选机制</text>
  
  <!-- Left: Eye -->
  <g transform="translate(120, 200)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#cyanGrad)" stroke-width="3"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#cyanGrad)" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#00D9FF"/>
    <text x="0" y="85" text-anchor="middle" fill="#E0E0E0" font-family="sans-serif" font-size="16">视网膜</text>
    <text x="0" y="105" text-anchor="middle" fill="#00D9FF" font-family="sans-serif" font-size="14">(接收所有光线)</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 190 200 L 300 200" stroke="url(#cyanGrad)" stroke-width="3" fill="none" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  <text x="245" y="185" text-anchor="middle" fill="#00D9FF" font-family="sans-serif" font-size="14">视觉信号</text>
  
  <!-- Middle: Brain -->
  <g transform="translate(400, 200)">
    <ellipse cx="0" cy="0" rx="70" ry="50" fill="none" stroke="url(#cyanGrad)" stroke-width="3"/>
    <path d="M -40 -20 Q -20 -40 0 -20 Q 20 0 40 -20" fill="none" stroke="url(#cyanGrad)" stroke-width="2"/>
    <path d="M -30 10 Q -10 30 10 10 Q 30 -10 50 10" fill="none" stroke="url(#cyanGrad)" stroke-width="2"/>
    <text x="0" y="75" text-anchor="middle" fill="#E0E0E0" font-family="sans-serif" font-size="16">大脑</text>
    <text x="0" y="95" text-anchor="middle" fill="#00D9FF" font-family="sans-serif" font-size="14">(信息筛选处理)</text>
  </g>
  
  <!-- Arrow to 顶部输出 -->
  <path d="M 440 160 L 520 100" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow to 中间输出 -->
  <path d="M 440 200 L 520 200" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow to 底部输出 -->
  <path d="M 440 250 L 520 320" stroke="#FF6B35" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#arrowhead)"/>
  
  <!-- 顶部: 有用信息 -->
  <g transform="translate(600, 90)">
    <rect x="-50" y="-25" width="100" height="50" rx="8" fill="none" stroke="#00D9FF" stroke-width="2"/>
    <text x="0" y="0" text-anchor="middle" fill="#00D9FF" font-family="sans-serif" font-size="14">有用信息</text>
    <text x="0" y="18" text-anchor="middle" fill="#00D9FF" font-family="sans-serif" font-size="12">✓ 保留</text>
  </g>
  
  <!-- 中间: 干扰信息 -->
  <g transform="translate(600, 200)">
    <rect x="-50" y="-25" width="100" height="50" rx="8" fill="none" stroke="#FF6B35" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="0" y="0" text-anchor="middle" fill="#FF6B35" font-family="sans-serif" font-size="14">干扰信息</text>
    <text x="0" y="18" text-anchor="middle" fill="#FF6B35" font-family="sans-serif" font-size="12">✗ 过滤</text>
  </g>
  
  <!-- 底部说明 -->
  <g transform="translate(400, 480)">
    <text x="0" y="0" text-anchor="middle" fill="#E0E0E0" font-family="sans-serif" font-size="14">光线进入眼睛 → 视网膜转化 → 大脑智能筛选 → 选择性接收</text>
  </g>
</svg>